version: '3.8'

services:
  app:
    build: .
    container_name: cta-track-app
    restart: always
    ports:
      - '80:3000'
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://ctauser:ctapassword@postgres:5432/cta_track
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      # Secrets passed from .env file
      - CTA_TRAIN_API_KEY=${CTA_TRAIN_API_KEY}
      - CTA_BUS_API_KEY=${CTA_BUS_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    container_name: cta-track-worker
    restart: always
    command: npm run worker
    environment:
      - DATABASE_URL=postgresql://ctauser:ctapassword@postgres:5432/cta_track
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      - CTA_TRAIN_API_KEY=${CTA_TRAIN_API_KEY}
      - CTA_BUS_API_KEY=${CTA_BUS_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: cta-track-postgres
    restart: always
    environment:
      POSTGRES_USER: ctauser
      POSTGRES_PASSWORD: ctapassword
      POSTGRES_DB: cta_track
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ctauser -d cta_track']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cta-track-redis
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
