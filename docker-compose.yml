version: '3.8'

services:
  app:
    build: .
    container_name: cta-track-app
    restart: always
    ports:
      - '80:3000'
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://ctauser:ctapassword@postgres:5432/cta_track
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      - TZ=America/Chicago
      - SCHEDULE_TIMEZONE=America/Chicago
      # With the default single-container layout, the Express process also
      # runs the BullMQ worker. Set to false if you scale out the `worker`
      # service below.
      - RUN_WORKER_IN_PROCESS=${RUN_WORKER_IN_PROCESS:-true}
      # Secrets passed from .env file
      - CTA_TRAIN_API_KEY=${CTA_TRAIN_API_KEY}
      - CTA_BUS_API_KEY=${CTA_BUS_API_KEY}
      - GOOGLE_GEMINI_API_KEY=${GOOGLE_GEMINI_API_KEY:-${GEMINI_API_KEY:-}}
      - JWT_SECRET=${JWT_SECRET}
      # Telegram bot
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME:-}
      - TELEGRAM_WEBHOOK_SECRET=${TELEGRAM_WEBHOOK_SECRET:-}
      # Email (required for email notifications)
      - EMAIL_USER=${EMAIL_USER:-}
      - EMAIL_PASS=${EMAIL_PASS:-}
      - EMAIL_HOST=${EMAIL_HOST:-}
      - EMAIL_PORT=${EMAIL_PORT:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Optional: only needed when scaling out. Start with:
  #   RUN_WORKER_IN_PROCESS=false docker compose --profile worker up
  worker:
    profiles: ['worker']
    build: .
    container_name: cta-track-worker
    restart: always
    command: npm run worker
    environment:
      - DATABASE_URL=postgresql://ctauser:ctapassword@postgres:5432/cta_track
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      - TZ=America/Chicago
      - SCHEDULE_TIMEZONE=America/Chicago
      - CTA_TRAIN_API_KEY=${CTA_TRAIN_API_KEY}
      - CTA_BUS_API_KEY=${CTA_BUS_API_KEY}
      - GOOGLE_GEMINI_API_KEY=${GOOGLE_GEMINI_API_KEY:-${GEMINI_API_KEY:-}}
      - JWT_SECRET=${JWT_SECRET}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME:-}
      - TELEGRAM_WEBHOOK_SECRET=${TELEGRAM_WEBHOOK_SECRET:-}
      - EMAIL_USER=${EMAIL_USER:-}
      - EMAIL_PASS=${EMAIL_PASS:-}
      - EMAIL_HOST=${EMAIL_HOST:-}
      - EMAIL_PORT=${EMAIL_PORT:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: cta-track-postgres
    restart: always
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ctauser
      POSTGRES_PASSWORD: ctapassword
      POSTGRES_DB: cta_track
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ctauser -d cta_track']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cta-track-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
